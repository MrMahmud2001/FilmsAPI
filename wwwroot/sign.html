<html>
	<head>
		<title>Иди и смотри: Вход в аккаунт</title>
		<link rel="stylesheet" href="css/style.css"/>
		<link rel="stylesheet" href="css/entrance_style.css"/>
		<meta charset="UTF-8">
	</head>
	<body>
		<main>
			<h1>Вход в аккаунт</h1>
			<section class="entrance">
				<div class="container">
					<div class="entrance_content">
						<form class="entrance_form">
							<p class="entrance_form_heading">Логин:</p>
							<input type="text" class="entrance_form_input" placeholder="Введите логин">
							<p class="entrance_form_heading">Пароль:</p>
							<input type="password" class="entrance_form_input" placeholder="Введите пароль">
							<button type="submit" class="entrance_form_button">Войти в аккаунт</button>
						</form>
						<p class="entrance_register_link">
							Еще нет аккаунта? <a href="register.html">Зарегистрироваться</a>
						</p>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
